services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bookit
      POSTGRES_PASSWORD: bookit
      POSTGRES_DB: bookit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookit -d bookit"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://bookit:bookit@db:5432/bookit
      JWT_SECRET: dev-secret-change-in-production
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
